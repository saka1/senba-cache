name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # `external-traces` feature is intentionally off: tests that read trace
      # files from the `external/NSDI24-SIEVE` git submodule do not run in CI.
      # Run them locally with `cargo test -p senba-research --features external-traces`.
      - run: cargo test --workspace

  test-scalar:
    name: Test (scalar fallback, SENBA_FORCE_SCALAR=1)
    runs-on: ubuntu-latest
    env:
      # Forces `senba::concurrent::Cache` to take the portable scalar tag
      # scan even on AVX2-capable runners. `-C target-feature=-avx2` alone
      # would NOT suffice — `is_x86_feature_detected!` queries the CPU at
      # runtime, and the AVX2 functions carry `#[target_feature]` so their
      # codegen is unaffected by the global flag. This env var is the
      # single point of override in `Cache::with_shards_and_hasher`.
      SENBA_FORCE_SCALAR: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: scalar
      - run: cargo clippy --workspace --all-targets
      - run: cargo test --workspace

  doc:
    name: Doc
    runs-on: ubuntu-slim
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Only the publishable crate's docs are gated; senba-research is internal
      # and its rustdoc is not user-facing.
      - run: cargo doc --no-deps -p senba

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: msrv
      # Enforces `rust-version = "1.85"` in Cargo.toml. Only senba (publishable)
      # is gated; senba-research is free to use newer toolchain features.
      - run: cargo check -p senba
