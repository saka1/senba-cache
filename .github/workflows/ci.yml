name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # `external-traces` feature is intentionally off: tests that read trace
      # files from the `external/NSDI24-SIEVE` git submodule do not run in CI.
      # Run them locally with `cargo test -p senba-research --features external-traces`.
      - run: cargo test --workspace

  test-scalar:
    name: Test (scalar fallback, SENBA_FORCE_SCALAR=1)
    runs-on: ubuntu-latest
    env:
      # Forces `senba::concurrent::Cache` to take the portable scalar tag
      # scan even on AVX2-capable runners. `-C target-feature=-avx2` alone
      # would NOT suffice — `is_x86_feature_detected!` queries the CPU at
      # runtime, and the AVX2 functions carry `#[target_feature]` so their
      # codegen is unaffected by the global flag. This env var is the
      # single point of override in `Cache::with_shards_and_hasher`.
      SENBA_FORCE_SCALAR: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: scalar
      - run: cargo clippy --workspace --all-targets
      - run: cargo test --workspace

  test-aarch64:
    name: Test (aarch64-unknown-linux-gnu, native)
    # Free Linux ARM runner for public repos (GitHub Actions, Jan 2025+).
    # Native execution catches what a cross-compile-only check can't:
    # weak-memory-ordering bugs in the scalar Path A double-load,
    # arch-specific alignment, atomic codegen differences. On aarch64
    # `has_avx2_bmi1` is forced `false` in `Cache::with_shards_and_hasher`,
    # so the test suite naturally exercises the scalar twins for both
    # `find_get` and `find_lockfree_for_path_a`.
    #
    # Target selection is explicit, not `--workspace --all-targets`:
    # `bench_concurrent` and `bench_vtune_concurrent` research drivers
    # import x86_64+non-miri-only experimental variants (sieve_c17s /
    # c18s / r1 / r2h / r3) via `use` and can't compile on aarch64.
    # `--workspace --tests` / `--benches` pulls these bins into test
    # mode even though they carry no `#[cfg(test)]` blocks (Cargo
    # `test = false` is not honoured by clippy `--tests`), so listing
    # the arch-portable targets one by one is the only working shape.
    #
    # senba (publishable surface) gets the full `--all-targets` treatment.
    # senba-research gets lib + 3 integration tests + 3 benches —
    # everything except the two problem bins.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: aarch64-native
      - run: cargo clippy -p senba --all-targets
      - run: |
          cargo clippy -p senba-research --lib \
            --test oracle --test oracle_cache_match --test oracle_concurrent_cache_match \
            --bench micro --bench sieve_cache_perf --bench sieve_concurrent_perf
      - run: cargo test -p senba --all-targets
      - run: |
          cargo test -p senba-research --lib \
            --test oracle --test oracle_cache_match --test oracle_concurrent_cache_match

  doc:
    name: Doc
    runs-on: ubuntu-slim
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Only the publishable crate's docs are gated; senba-research is internal
      # and its rustdoc is not user-facing.
      - run: cargo doc --no-deps -p senba

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: msrv
      # Enforces `rust-version = "1.85"` in Cargo.toml. Only senba (publishable)
      # is gated; senba-research is free to use newer toolchain features.
      - run: cargo check -p senba
