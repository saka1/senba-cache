[package]
name = "senba-cache"
version = "0.1.0"
edition = "2024"

[dependencies]
rand = "0.10"
rand_distr = "0.6"

[dev-dependencies]
criterion = { version = "0.8", default-features = false }

[[bench]]
name = "micro"
harness = false

# samply / perf annotate でソース行と asm を対応させるための debuginfo。
# bench は release プロファイルから派生するので両方に入れておく。
[profile.release]
debug = "line-tables-only"

[profile.bench]
debug = "line-tables-only"
