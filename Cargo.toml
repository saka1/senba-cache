[package]
name = "senba-cache"
version = "0.1.0"
edition = "2024"
# Keep the crates.io payload focused on the publishable surface. Research
# modules, oracle / experimental drivers, internal design notes, and
# vendored references are excluded — they remain in the repository for
# development but are not shipped to consumers.
exclude = [
    "src/experimental/",
    "src/sieve_orig.rs",
    "src/bin/",
    "benches/micro.rs",
    "tests/oracle.rs",
    "external/",
    "profiles/",
    "scripts/",
    "docs/reports/",
    "docs/figures/",
    "docs/superpowers/",
    "docs/api-comparison.md",
    "docs/improvement-ideas.md",
    "docs/sieve-paper-workload.md",
    "CLAUDE.md",
    ".claude/",
]

[dependencies]
rand = "0.10"
rand_distr = "0.6"
xxhash-rust = { version = "0.8", features = ["xxh3"] }
# W-TinyLFU 比較用 (bench からのみ参照)。moka 本体ではなく mini-moka を選ぶのは
# synchronous + background thread 無しで CPU を奪われない公平条件を作るため。
mini-moka = { version = "0.10", optional = true }
# moka 0.12+ は adaptive window sizing が入っており、scan-heavy で window を広げる。
# mini-moka との比較で「default tuning がボトルネックか / W-TinyLFU 系全般の性質か」を切り分ける。
moka = { version = "0.12", default-features = false, features = ["sync"], optional = true }
# c8 (並行 j8) で writer 直列化に使う。std::sync::Mutex より uncontended が速く
# (~12 ns vs ~25 ns)、PoisonError も持たない。read path は lock-free なので
# writer 競合域でだけ効く。
parking_lot = { version = "0.12", optional = true }

[dev-dependencies]
criterion = { version = "0.8", default-features = false }

[features]
# Enables the research / dev surface: `experimental` module (historical
# SIEVE variants), `sieve_orig` (oracle reference port), the `CacheImpl`
# trait used by the cross-variant test / bench drivers, and the `impl
# CacheImpl for Cache` adapter. The publishable surface (`Cache`, `Drain`,
# `Stats`, `SlotSize`, `hash`, `workload`) is unaffected by this flag.
experimental = ["dep:mini-moka", "dep:moka", "dep:parking_lot"]

[[bench]]
name = "micro"
harness = false
required-features = ["experimental"]

# Performance regression bench for the library-grade `senba_cache::Cache`
# (sieve_cache.rs). Quality-gate companion to `cargo test`: fast (~10s),
# narrow scenario set, fixed seeds, intended for `--save-baseline` /
# `--baseline` comparison. See benches/sieve_cache_perf.rs and CLAUDE.md.
[[bench]]
name = "sieve_cache_perf"
harness = false

# Research drivers — both consume `senba_cache::CacheImpl` and the
# `experimental` / `sieve_orig` modules. Listing them explicitly disables
# Cargo's `src/bin/` auto-discovery for default-feature builds.
[[bin]]
name = "bench"
required-features = ["experimental"]

[[bin]]
name = "bench_concurrent"
required-features = ["experimental"]

[[test]]
name = "oracle"
required-features = ["experimental"]

# samply / perf annotate でソース行と asm を対応させるための debuginfo。
# bench は release プロファイルから派生するので両方に入れておく。
[profile.release]
debug = "line-tables-only"

[profile.bench]
debug = "line-tables-only"
